# norway.conf — example configuration

entrypoint web {
    listen :8080
}

service api {
    balance weighted

    health {
        path     /health
        interval 10s
        timeout  2s
    }

    server http://localhost:8001 {
        weight 3
    }
    #default weight is 1, so this server will receive 1/4 of the traffic
    server http://localhost:8002
}

service app {
    balance least-conn
    server http://localhost:3000
}

middleware rate-limit {
    type ratelimit
    rate 100
    burst 50
}

middleware add-headers {
    type headers
    set X-Proxy "norway"
    set X-Version "0.1"
    set X-Powered-By "norway/0.1"
    remove Server
}

middleware logger {
    type logging
    format json
}

route api {
    entrypoints web
    host api.example.com
    path /v1/*
    service api
    use rate-limit
    use add-headers
    use logger
}

route app {
    entrypoints web
    host app.example.com
    service app
    use logger
}
